name: Docker Composes

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend
        run: docker build -t hibatouik/flask-api ./backend

      - name: Build frontend
        run: docker build -t hibatouik/frontend-app ./frontend

      - name: Push backend
        run: docker push hibatouik/flask-api

      - name: Push frontend
        run: docker push hibatouik/frontend-app